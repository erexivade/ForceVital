    <text x="180" y="397" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="68" fill="#ffffff" font-weight="800" font-style="italic">Vital</text>
    <rect x="105" y="426" width="150" height="35" rx="17" fill="#33363c" stroke="#777"/>
    <text x="180" y="450" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#fff" font-weight="700">30 KAPSELN</text>
    <text x="180" y="503" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ddd">Nahrungsergänzungsmittel</text>
    <text x="180" y="519" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ddd">mit Nährstoffen und pflanzlichen Stoffen</text>
