<svg xmlns="http://www.w3.org/2000/svg" width="360" height="620" viewBox="0 0 360 620" role="img" aria-labelledby="title desc">
  <title id="title">ForceVital Produktflasche</title>
  <desc id="desc">Illustration einer ForceVital Flasche mit schwarzem Etikett und 30 Kapseln Hinweis.</desc>
  <defs>
    <linearGradient id="bottle" x1="0" x2="1">
      <stop offset="0" stop-color="#f7f7f7"/>
      <stop offset="0.25" stop-color="#d9d9d9"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bebebe"/>
    </linearGradient>
    <linearGradient id="label" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1014"/>
      <stop offset="0.55" stop-color="#2a2b31"/>
      <stop offset="1" stop-color="#111216"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="360" height="620" fill="#fff"/>
  <g filter="url(#shadow)">
    <rect x="89" y="25" width="182" height="78" rx="18" fill="url(#bottle)" stroke="#d5d5d5"/>
    <g stroke="#c7c7c7" stroke-width="3">
      <line x1="104" y1="31" x2="104" y2="96"/><line x1="119" y1="31" x2="119" y2="96"/><line x1="134" y1="31" x2="134" y2="96"/>
      <line x1="149" y1="31" x2="149" y2="96"/><line x1="164" y1="31" x2="164" y2="96"/><line x1="179" y1="31" x2="179" y2="96"/>
      <line x1="194" y1="31" x2="194" y2="96"/><line x1="209" y1="31" x2="209" y2="96"/><line x1="224" y1="31" x2="224" y2="96"/>
      <line x1="239" y1="31" x2="239" y2="96"/><line x1="254" y1="31" x2="254" y2="96"/>
    </g>
    <path d="M112 96h136l13 62H99z" fill="url(#bottle)" stroke="#d3d3d3"/>
    <rect x="47" y="139" width="266" height="442" rx="58" fill="url(#bottle)" stroke="#cbcbcb"/>
